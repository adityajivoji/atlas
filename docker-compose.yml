services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB_URL: postgresql+asyncpg://atlas:atlas_dev_password@postgres:5432/atlas
      POSTGRES_MIGRATION_URL: postgresql+psycopg2://atlas:atlas_dev_password@postgres:5432/atlas
      JWT_ALGORITHM: RS256
      KEYS_DIR: /app/var/keys
      DEFAULT_KID: atlas-local-dev-key
      ACCESS_TOKEN_TTL_MINUTES: 10
      REFRESH_TOKEN_TTL_DAYS: 30
      SUPER_USER_ID: 00000000-0000-0000-0000-000000000001
      SUPER_USER_NAME: Atlas Admin
      SUPER_USER_USER_NAME: admin
      SUPER_USER_PASSWORD: ChangeMe123!
      SUPER_USER_EMAIL: admin@example.com
      CORS_ALLOWED_ORIGINS: http://localhost,http://localhost:8000,http://localhost:8080,http://localhost:4200
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
    volumes:
      - atlas-keys:/app/var/keys
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas_dev_password
      POSTGRES_DB: atlas
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  atlas-keys:
  postgres-data:
